services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: acs_payments
      POSTGRES_USER: acs_user
      POSTGRES_PASSWORD: acs_pass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U acs_user -d acs_payments"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://acs_user:acs_pass@db:5432/acs_payments
      SECRET_KEY: dev-secret-key-not-for-production
    ports:
      - "8000:8000"
    volumes:
      - ./src:/app/src
      - ./scripts:/app/scripts

volumes:
  pgdata:
